version: "3.9"

services:
  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cdna_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cdna_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdna_secret}
      POSTGRES_DB: ${POSTGRES_DB:-creator_dna}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdna_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (caching & rate limiting) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cdna_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: cdna_auth
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdna_user}:${POSTGRES_PASSWORD:-cdna_secret}@postgres:5432/${POSTGRES_DB:-creator_dna}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── AI Service ───────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: cdna_ai
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdna_user}:${POSTGRES_PASSWORD:-cdna_secret}@postgres:5432/${POSTGRES_DB:-creator_dna}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── DNA Service ──────────────────────────────────────────────────────────────
  dna-service:
    build:
      context: ./services/dna
      dockerfile: Dockerfile
    container_name: cdna_dna
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdna_user}:${POSTGRES_PASSWORD:-cdna_secret}@postgres:5432/${POSTGRES_DB:-creator_dna}
      REDIS_URL: redis://redis:6379/2
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Memory Service ───────────────────────────────────────────────────────────
  memory-service:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    container_name: cdna_memory
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdna_user}:${POSTGRES_PASSWORD:-cdna_secret}@postgres:5432/${POSTGRES_DB:-creator_dna}
      REDIS_URL: redis://redis:6379/3
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Media Service ────────────────────────────────────────────────────────────
  media-service:
    build:
      context: ./services/media
      dockerfile: Dockerfile
    container_name: cdna_media
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdna_user}:${POSTGRES_PASSWORD:-cdna_secret}@postgres:5432/${POSTGRES_DB:-creator_dna}
      REDIS_URL: redis://redis:6379/4
    volumes:
      - media_uploads:/app/uploads
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Projects Service ─────────────────────────────────────────────────────────
  projects-service:
    build:
      context: ./services/projects
      dockerfile: Dockerfile
    container_name: cdna_projects
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdna_user}:${POSTGRES_PASSWORD:-cdna_secret}@postgres:5432/${POSTGRES_DB:-creator_dna}
      REDIS_URL: redis://redis:6379/5
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: cdna_gateway
    restart: unless-stopped
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      AI_SERVICE_URL: http://ai-service:8002
      DNA_SERVICE_URL: http://dna-service:8003
      MEMORY_SERVICE_URL: http://memory-service:8004
      MEDIA_SERVICE_URL: http://media-service:8005
      PROJECTS_SERVICE_URL: http://projects-service:8006
      REDIS_URL: redis://redis:6379/6
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - ai-service
      - dna-service
      - memory-service
      - media-service
      - projects-service

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cdna_web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  media_uploads:
