name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: android

      - name: Rename APK
        run: |
          mkdir -p ../release
          cp app/build/outputs/apk/debug/app-debug.apk ../release/creator-dna-os.apk
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: creator-dna-os-apk
          path: release/creator-dna-os.apk
          retention-days: 30

      - name: Create GitHub Release (on main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Creator DNA OS APK — Build ${{ github.run_number }}"
          body: |
            ## 📱 Creator DNA OS Android APK

            Auto-built from commit `${{ github.sha }}`

            ### Install
            1. Download `creator-dna-os.apk` below
            2. On your Android phone: **Settings → Security → Install unknown apps → Allow**
            3. Open the downloaded APK and tap **Install**

            ### What's inside
            - 🧬 iOS-style home screen launcher
            - 🌐 Open Web App button (live site)
            - 💻 Local Server button (Termux backend)
            - 📱 Bottom dock navigation
          files: release/creator-dna-os.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
